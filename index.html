* { font-family: 'Tajawal', sans-serif; }
html, body { height: 100%; margin: 0; }
.app-root { height: 100%; overflow: auto; }

/* Animations */
@keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
@keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(14, 165, 233, 0.3); } 50% { box-shadow: 0 0 40px rgba(14, 165, 233, 0.6); } }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.fade-in-up { animation: fadeInUp 0.6s ease forwards; }
.slide-in { animation: slideIn 0.4s ease forwards; }
.pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
.float-anim { animation: float 3s ease-in-out infinite; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #1e293b; }
::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 3px; }

/* Cards hover */
.topic-card { transition: all 0.3s ease; }
.topic-card:hover { transform: translateY(-6px); }

.model-btn { transition: all 0.2s ease; }
.model-btn:hover { transform: scale(1.05); }

/* Question image */
.q-img-container {
  background: linear-gradient(135deg, #0f172a, #1e3a5f);
  border: 2px solid #0ea5e9;
  border-radius: 12px;
  padding: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 80px;
  max-width: 180px;
}

/* Progress bar */
.progress-fill { transition: width 0.5s ease; }

/* Toast */
.toast-msg {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  padding: 12px 24px; border-radius: 10px; z-index: 9999;
  animation: fadeInUp 0.3s ease;
}
</style>

    color: 'from-emerald-500 to-green-400',

        { title: 'الاحتمالات', content: 'احتمال حدث = عدد النتائج المطلوبة ÷ عدد النتائج الكلية. مثال: احتمال ظهور ٦ عند رمي نرد = ١/٦' }

        { title: 'أخطاء شائعة', content: 'لا تفترض أن المتغير دائماً موجب. جرّب حالات مختلفة قبل اختيار "لا يمكن التحديد".', img: 'compare' },
        { title: 'المقارنة بالكسور', content: 'لمقارنة كسرين: وحّد المقامات أو حوّلهما لأعداد عشرية. مثال: ٣/٥ و ٢/٣ → ٩/١٥ و ١٠/١٥ → ٢/٣ أكبر' },
        { title: 'المقارنة بالجذور', content: 'لمقارنة جذرين: ارفعهما للتربيع. مثال: √٥ و ٢ → ٥ و ٤ → √٥ أكبر' }
      ]
    }
  },
  {
    id: 'word_problems',
    name: 'المسائل الكلامية',
    icon: 'book-open',
    color: 'from-teal-500 to-cyan-400',
    guide: {
      title: 'دليل قسم المسائل الكلامية',
      sections: [
        { title: 'خطوات الحل', content: '١- اقرأ المسألة بعناية. ٢- حدد المعطيات والمطلوب. ٣- اختر العملية المناسبة. ٤- حل وتحقق.' },
        { title: 'مسائل السرعة والمسافة', content: 'المسافة = السرعة × الزمن. السرعة = المسافة ÷ الزمن. الزمن = المسافة ÷ السرعة.', img: 'speed' },

// ===== Questions Generator =====
function generateQuestions(topicId, modelNum) {
  const seed = topicId.length * 100 + modelNum;
  const rng = (n) => ((seed * 9301 + 49297 + n * 233) % 233280) / 233280;

  const questions = [];
  const toAr = (n) => n.toString().replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);

  if (topicId === 'arithmetic') {
    const ops = [
      (i) => {
        const a = Math.floor(rng(i*3)*50)+10, b = Math.floor(rng(i*3+1)*50)+10;
        return { q: `ما ناتج ${toAr(a)} + ${toAr(b)} ؟`, opts: [toAr(a+b), toAr(a+b+5), toAr(a+b-3), toAr(a+b+10)], correct: 0, hasImg: i%4===0, imgType: 'arithmetic' };
      },
      (i) => {
        const a = Math.floor(rng(i*3)*80)+20, b = Math.floor(rng(i*3+1)*20)+5;
        return { q: `ما ناتج ${toAr(a)} - ${toAr(b)} ؟`, opts: [toAr(a-b), toAr(a-b+2), toAr(a-b-3), toAr(a-b+7)], correct: 0, hasImg: i%5===1, imgType: 'subtract' };
      },
      (i) => {
        const a = Math.floor(rng(i*3)*12)+2, b = Math.floor(rng(i*3+1)*12)+2;
        return { q: `ما ناتج ${toAr(a)} × ${toAr(b)} ؟`, opts: [toAr(a*b), toAr(a*b+a), toAr(a*b-b), toAr(a*b+3)], correct: 0, hasImg: i%3===0, imgType: 'multiply' };
      },
      (i) => {
        const b = Math.floor(rng(i*3)*10)+2, a = b * (Math.floor(rng(i*3+1)*10)+2);
        return { q: `ما ناتج ${toAr(a)} ÷ ${toAr(b)} ؟`, opts: [toAr(a/b), toAr(a/b+1), toAr(a/b-1), toAr(a/b+2)], correct: 0, hasImg: false, imgType: '' };
      },
      (i) => {
        const pcts = [10,15,20,25,30]; const p = pcts[Math.floor(rng(i*7)*pcts.length)];
        const v = (Math.floor(rng(i*5)*10)+1)*100;
        const ans = v*p/100;
        return { q: `ما قيمة ${toAr(p)}٪ من ${toAr(v)} ؟`, opts: [toAr(ans), toAr(ans+10), toAr(ans-5), toAr(ans+25)], correct: 0, hasImg: i%4===2, imgType: 'percent' };
      }
    ];
    for (let i = 0; i < 20; i++) {
      const fn = ops[i % ops.length];
      questions.push(fn(i + modelNum * 20));
    }
  } else if (topicId === 'algebra') {
    for (let i = 0; i < 20; i++) {
      const v = Math.floor(rng(i*7+modelNum)*10)+1;
      const c = Math.floor(rng(i*11+modelNum)*20)+1;
      const types = [
        () => ({ q: `إذا كان ٢س + ${toAr(c)} = ${toAr(2*v+c)}، فما قيمة س؟`, opts: [toAr(v), toAr(v+1), toAr(v-1), toAr(v+3)], correct: 0, hasImg: i%4===0, imgType: 'equation' }),
        () => ({ q: `بسّط: ${toAr(3)}س + ${toAr(5)}س - ${toAr(2)}س`, opts: [toAr(6)+'س', toAr(8)+'س', toAr(10)+'س', toAr(4)+'س'], correct: 0, hasImg: false }),
        () => ({ q: `إذا كان س² = ${toAr(v*v)}، فما قيمة س الموجبة؟`, opts: [toAr(v), toAr(v+1), toAr(v-1), toAr(v*2)], correct: 0, hasImg: i%3===0, imgType: 'quadratic' }),
        () => {
          const a=Math.floor(rng(i*13)*5)+1, b=Math.floor(rng(i*17)*5)+1;
          return { q: `حلّل: س² - ${toAr(a*a)}`, opts: [`(س+${toAr(a)})(س-${toAr(a)})`, `(س+${toAr(a)})²`, `(س-${toAr(a)})²`, `س(س-${toAr(a*a)})`], correct: 0, hasImg: false };
        }
      ];
      questions.push(types[i%types.length]());
    }
  } else if (topicId === 'geometry') {
    for (let i = 0; i < 20; i++) {
      const s = Math.floor(rng(i*9+modelNum)*10)+3;
      const types = [
        () => ({ q: `مساحة مربع طول ضلعه ${toAr(s)} سم = ؟`, opts: [toAr(s*s)+' سم²', toAr(s*4)+' سم²', toAr(s*s+s)+' سم²', toAr(s*(s+1))+' سم²'], correct: 0, hasImg: true, imgType: 'square' }),
        () => ({ q: `محيط مستطيل طوله ${toAr(s+3)} وعرضه ${toAr(s)} = ؟`, opts: [toAr(2*(s+3+s))+' سم', toAr((s+3)*s)+' سم', toAr(2*s*(s+3))+' سم', toAr(s+3+s)+' سم'], correct: 0, hasImg: true, imgType: 'rectangle' }),
        () => ({ q: `مساحة مثلث قاعدته ${toAr(s*2)} وارتفاعه ${toAr(s)} = ؟`, opts: [toAr(s*s)+' سم²', toAr(s*s*2)+' سم²', toAr(s*2+s)+' سم²', toAr(s*s-s)+' سم²'], correct: 0, hasImg: true, imgType: 'triangle_q' }),
        () => {
          const a=3+Math.floor(rng(i*23)*5), b=4+Math.floor(rng(i*29)*5);
          const c2=a*a+b*b; const c=Math.sqrt(c2);
          const cR = Math.round(c*10)/10;
          return { q: `في مثلث قائم الزاوية، إذا كان الضلعان ${toAr(a)} و ${toAr(b)}، فما طول الوتر؟`, opts: [toAr(cR), toAr(a+b), toAr(Math.round(c)+1), toAr(a*b)].map(String), correct: 0, hasImg: true, imgType: 'pythagoras_q' };
        }
      ];
      questions.push(types[i%types.length]());
    }
  } else if (topicId === 'statistics') {
    for (let i = 0; i < 20; i++) {
      const vals = Array.from({length:5}, (_,j) => Math.floor(rng(i*7+j+modelNum*3)*20)+1);
      vals.sort((a,b)=>a-b);
      const sum = vals.reduce((a,b)=>a+b,0);
      const mean = sum/5;
      const median = vals[2];
      const types = [
        () => ({ q: `المتوسط الحسابي للأعداد: ${vals.map(toAr).join('، ')}`, opts: [toAr(mean), toAr(mean+1), toAr(median), toAr(sum)], correct: 0, hasImg: i%3===0, imgType: 'chart' }),
        () => ({ q: `الوسيط للأعداد: ${vals.map(toAr).join('، ')}`, opts: [toAr(median), toAr(mean), toAr(vals[0]), toAr(vals[4])], correct: 0, hasImg: false }),
        () => ({ q: `المدى للأعداد: ${vals.map(toAr).join('، ')}`, opts: [toAr(vals[4]-vals[0]), toAr(vals[4]), toAr(vals[0]), toAr(sum)], correct: 0, hasImg: i%4===0, imgType: 'range' }),
        () => ({ q: `إذا رمينا نرداً، ما احتمال ظهور عدد زوجي؟`, opts: ['١/٢', '١/٣', '١/٦', '٢/٣'], correct: 0, hasImg: i%5===0, imgType: 'dice' })
      ];
      questions.push(types[i%types.length]());
    }
  } else if (topicId === 'comparison') {
    for (let i = 0; i < 20; i++) {
      const a = Math.floor(rng(i*11+modelNum)*20)+1;
      const b = Math.floor(rng(i*13+modelNum)*20)+1;
      const types = [
        () => {
          const x = a*a, y = a*(a+1);
          return { q: `قارن بين:\nالعمود أ: ${toAr(x)}\nالعمود ب: ${toAr(y)}`, opts: ['العمود أ أكبر', 'العمود ب أكبر', 'متساويان', 'لا يمكن التحديد'], correct: 1, hasImg: i%3===0, imgType: 'compare_q' };
        },
        () => ({ q: `قارن بين:\nالعمود أ: ${toAr(a)} + ${toAr(b)}\nالعمود ب: ${toAr(a+b)}`, opts: ['العمود أ أكبر', 'العمود ب أكبر', 'متساويان', 'لا يمكن التحديد'], correct: 2, hasImg: false }),
        () => {
          return { q: `قارن بين:\nالعمود أ: √${toAr(a*a+2*a+1)}\nالعمود ب: ${toAr(a+1)}`, opts: ['العمود أ أكبر', 'العمود ب أكبر', 'متساويان', 'لا يمكن التحديد'], correct: 2, hasImg: i%4===0, imgType: 'sqrt_compare' };
        }
      ];
      questions.push(types[i%types.length]());
    }
  } else if (topicId === 'word_problems') {
    for (let i = 0; i < 20; i++) {
      const s = (Math.floor(rng(i*7+modelNum)*8)+2)*10;
      const t = Math.floor(rng(i*11+modelNum)*5)+2;
      const types = [
        () => ({ q: `سيارة تسير بسرعة ${toAr(s)} كم/ساعة. كم تقطع في ${toAr(t)} ساعات؟`, opts: [toAr(s*t)+' كم', toAr(s*t+s)+' كم', toAr(s+t)+' كم', toAr(s*t-s)+' كم'], correct: 0, hasImg: true, imgType: 'car' }),
        () => {
          const price = (Math.floor(rng(i*19+modelNum)*5)+1)*100;
          const disc = [10,20,25,30][Math.floor(rng(i*23)*4)];
          const final_p = price - price*disc/100;
          return { q: `منتج سعره ${toAr(price)} ريال، عليه خصم ${toAr(disc)}٪. ما السعر بعد الخصم؟`, opts: [toAr(final_p)+' ريال', toAr(price-disc)+' ريال', toAr(final_p+10)+' ريال', toAr(price)+' ريال'], correct: 0, hasImg: i%3===0, imgType: 'discount' };
        },
        () => {
          const w1 = Math.floor(rng(i*31+modelNum)*4)+2, w2 = Math.floor(rng(i*37+modelNum)*4)+3;
          const lcm = (w1*w2); // simplified
          return { q: `عامل ينجز عملاً في ${toAr(w1)} أيام وآخر في ${toAr(w2)} أيام. كم ينجزان معاً في يوم واحد؟`, opts: [`١/${toAr(w1)} + ١/${toAr(w2)}`, `١/${toAr(w1+w2)}`, `${toAr(w1+w2)}`, `${toAr(w1*w2)}`], correct: 0, hasImg: false };
        },
        () => {
          const total = (Math.floor(rng(i*41+modelNum)*5)+2)*10;
          const r1=3, r2=2; const sum=r1+r2;
          const v1=total*r1/sum;
          return { q: `قُسم ${toAr(total)} ريال بين شخصين بنسبة ٣:٢. ما نصيب الأول؟`, opts: [toAr(v1)+' ريال', toAr(total-v1)+' ريال', toAr(total/2)+' ريال', toAr(v1+10)+' ريال'], correct: 0, hasImg: i%4===0, imgType: 'ratio' };
        }
      ];
      questions.push(types[i%types.length]());
    }
  }

  // Shuffle options but track correct
  questions.forEach(q => {
    if (!q.opts || q.opts.length < 4) return;
    const correctAns = q.opts[q.correct];
    // Simple shuffle
    for (let j = q.opts.length - 1; j > 0; j--) {
      const k = Math.floor(rng(j * 997 + questions.indexOf(q)) * (j + 1));
      [q.opts[j], q.opts[k]] = [q.opts[k], q.opts[j]];
    }
    q.correct = q.opts.indexOf(correctAns);
  });

  return questions;
}

function selectAnswer(qIndex, optIndex, btn) {
  quizAnswers[qIndex] = optIndex;

  const qDiv = document.getElementById('q' + qIndex);

  });

  // Update progress
  const answered = Object.keys(quizAnswers).length;
  document.getElementById('quizProgress').style.width = (answered/20*100) + '%';
}

async function submitQuiz(topicId, modelNum) {
  const questions = generateQuestions(topicId, modelNum);
  let score = 0;
  for (let i = 0; i < 20; i++) {
    if (quizAnswers[i] === questions[i].correct) score++;
  }

  const toAr = (n) => n.toString().replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
  const topic = topics.find(t => t.id === topicId);
  const timeTaken = Math.round((Date.now() - quizStartTime) / 1000);
  const mins = Math.floor(timeTaken / 60);
  const secs = timeTaken % 60;

  // Show results
  const content = document.getElementById('mainContent');

  // Highlight correct/wrong
  const resultsHTML = questions.map((q, i) => {
    const userAns = quizAnswers[i];
    const isCorrect = userAns === q.correct;
    const borderColor = userAns === undefined ? 'border-slate-600' : isCorrect ? 'border-emerald-500' : 'border-red-500';
    return `
      <div class="bg-slate-800/60 border ${borderColor} rounded-xl p-4 fade-in-up" style="animation-delay: ${Math.min(i*0.03, 0.3)}s">
        <div class="flex items-start gap-3 mb-3">
          <span class="w-7 h-7 rounded-lg ${isCorrect ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'} flex items-center justify-center font-bold text-xs flex-shrink-0">
            ${userAns === undefined ? '−' : isCorrect ? '✓' : '✗'}
          </span>
          <p class="text-white text-sm leading-relaxed whitespace-pre-line">${q.q}</p>
        </div>
        ${q.hasImg && q.imgType ? `<div class="q-img-container mb-3" style="min-height:80px">${generateQuestionSVG(q.imgType)}</div>` : ''}
        <div class="grid grid-cols-2 gap-1.5">
          ${q.opts.map((opt, j) => {
            let cls = 'bg-slate-700/30 border border-slate-600 text-slate-400';
            if (j === q.correct) cls = 'bg-emerald-500/15 border border-emerald-500 text-emerald-400 font-medium';
            else if (j === userAns && !isCorrect) cls = 'bg-red-500/15 border border-red-500 text-red-400 line-through';
            return `<div class="rounded-lg px-3 py-2 text-xs ${cls}">${['أ','ب','ج','د'][j]}) ${opt}</div>`;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');

  const pct = Math.round(score / 20 * 100);
  const grade = pct >= 90 ? '🏆 ممتاز' : pct >= 75 ? '⭐ جيد جداً' : pct >= 60 ? '👍 جيد' : pct >= 50 ? '📝 مقبول' : '💪 حاول مرة أخرى';

  content.innerHTML = `
    <div class="max-w-3xl mx-auto">
      <div class="text-center mb-6 fade-in-up">
        <div class="text-6xl mb-3">${pct >= 75 ? '🎉' : pct >= 50 ? '👏' : '💪'}</div>
        <h2 class="text-2xl font-bold text-white mb-1">${grade}</h2>
        <p class="text-slate-400">${topic.name} - نموذج ${toAr(modelNum)}</p>
      </div>

      <div class="grid grid-cols-3 gap-3 mb-6 fade-in-up">
        <div class="bg-slate-800/60 border border-slate-700 rounded-xl p-4 text-center">
          <div class="text-2xl font-bold text-sky-400">${toAr(score)}/${toAr(20)}</div>
          <div class="text-slate-400 text-xs mt-1">الدرجة</div>
        </div>
        <div class="bg-slate-800/60 border border-slate-700 rounded-xl p-4 text-center">
          <div class="text-2xl font-bold text-emerald-400">${toAr(pct)}٪</div>
          <div class="text-slate-400 text-xs mt-1">النسبة</div>
        </div>
        <div class="bg-slate-800/60 border border-slate-700 rounded-xl p-4 text-center">
          <div class="text-2xl font-bold text-amber-400">${toAr(mins)}:${toAr(secs < 10 ? '0'+secs : secs)}</div>
          <div class="text-slate-400 text-xs mt-1">الوقت</div>
        </div>
      </div>

      <div class="flex gap-3 mb-6 fade-in-up">
        <button onclick="openTopic('${topicId}')" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl transition">
          النماذج
        </button>
        <button onclick="startQuiz('${topicId}', ${modelNum})" class="flex-1 bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-400 hover:to-blue-500 text-white font-bold py-3 rounded-xl transition">
          إعادة المحاولة
        </button>
      </div>

      <h3 class="text-lg font-bold text-white mb-3">مراجعة الإجابات</h3>
      <div class="space-y-3">${resultsHTML}</div>
    </div>
  `;
  lucide.createIcons();

  // Save result
  if (allResults.length >= 999) {
    showToast('تم الوصول للحد الأقصى من النتائج', 'warning');
    return;
  }

  const btn = document.getElementById('submitBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'جاري الحفظ...'; }

  const result = await window.dataSdk.create({
    student_name: currentUser,
    topic: topic.name,
    model_number: modelNum,
    score: score,
    total: 20,
    date: new Date().toISOString()
  });

  if (result.isOk) {
    showToast('تم حفظ النتيجة بنجاح ✓', 'success');
  } else {
    showToast('لم يتم حفظ النتيجة', 'error');
  }
}

function renderAdmin() {
  const content = document.getElementById('adminContent');
  const toAr = (n) => n.toString().replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);

  if (allResults.length === 0) {
    content.innerHTML = `
      <div class="max-w-3xl mx-auto text-center py-16 fade-in-up">
        <div class="text-5xl mb-4">📊</div>
        <h3 class="text-xl font-bold text-white mb-2">لا توجد نتائج بعد</h3>
        <p class="text-slate-400">ستظهر نتائج الطلاب هنا بعد إكمالهم الاختبارات</p>
      </div>
    `;
    return;
  }

  // Group by student
  const byStudent = {};
  allResults.forEach(r => {
    if (!byStudent[r.student_name]) byStudent[r.student_name] = [];
    byStudent[r.student_name].push(r);
  });

  const studentsHTML = Object.entries(byStudent).map(([name, results], si) => {
    const avg = Math.round(results.reduce((a, r) => a + (r.score/r.total*100), 0) / results.length);
    return `
      <div class="bg-slate-800/60 border border-slate-700 rounded-xl p-5 fade-in-up" style="animation-delay: ${si*0.1}s">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-amber-400 to-orange-500 flex items-center justify-center text-white font-bold">
              ${name.charAt(0)}
            </div>
            <div>
              <h4 class="text-white font-bold">${name}</h4>
              <p class="text-slate-400 text-xs">${toAr(results.length)} اختبار</p>
            </div>
          </div>
          <div class="text-left">
            <div class="text-lg font-bold ${avg >= 75 ? 'text-emerald-400' : avg >= 50 ? 'text-amber-400' : 'text-red-400'}">${toAr(avg)}٪</div>
            <div class="text-slate-500 text-xs">المعدل</div>
          </div>
        </div>
        <div class="space-y-1.5 max-h-60 overflow-auto">
          ${results.sort((a,b) => new Date(b.date) - new Date(a.date)).map(r => {
            const pct = Math.round(r.score/r.total*100);
            const d = new Date(r.date);
            const dateStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
            return `
              <div class="flex items-center justify-between bg-slate-700/40 rounded-lg px-3 py-2 text-sm">
                <span class="text-slate-300">${r.topic} - نموذج ${toAr(r.model_number)}</span>
                <div class="flex items-center gap-3">
                  <span class="text-slate-500 text-xs">${dateStr}</span>
                  <span class="${pct >= 75 ? 'text-emerald-400' : pct >= 50 ? 'text-amber-400' : 'text-red-400'} font-bold">${toAr(r.score)}/${toAr(r.total)}</span>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');

  content.innerHTML = `
    <div class="max-w-3xl mx-auto">
      <div class="text-center mb-6 fade-in-up">
        <h2 class="text-2xl font-bold text-amber-400 mb-1">📊 نتائج الطلاب</h2>
        <p class="text-slate-400">إجمالي ${toAr(allResults.length)} نتيجة من ${toAr(Object.keys(byStudent).length)} طالب</p>
      </div>
      <div class="space-y-4">${studentsHTML}</div>
    </div>
  `;
}

// ===== Auth =====
function handleLogin() {
  const name = document.getElementById('nameInput').value.trim();
  const pass = document.getElementById('passInput').value.trim();
  const errorEl = document.getElementById('loginError');

  if (!name) {
    errorEl.textContent = 'الرجاء إدخال الاسم';
    errorEl.classList.remove('hidden');
    return;
  }
  if (pass !== PASS) {
    errorEl.textContent = 'كلمة المرور غير صحيحة';
    errorEl.classList.remove('hidden');
    return;
  }

  errorEl.classList.add('hidden');
  currentUser = name;

  if (name === ADMIN_NAME) {
    isAdmin = true;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
    renderAdmin();
  } else {
    isAdmin = false;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    document.getElementById('userBadge').textContent = name;
    renderHome();
  }
}

function handleLogout() {
  currentUser = '';
  isAdmin = false;
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('adminPanel').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('nameInput').value = '';
  document.getElementById('passInput').value = '';
}

function navigateTo(view) {
  if (view === 'home') renderHome();
}

// ===== Toast =====
function showToast(msg, type) {
  const existing = document.querySelector('.toast-msg');
  if (existing) existing.remove();

  const colors = {
    success: 'bg-emerald-500/90 text-white',
    error: 'bg-red-500/90 text-white',
    warning: 'bg-amber-500/90 text-white'
  };

  const toast = document.createElement('div');
  toast.className = `toast-msg ${colors[type] || colors.success} font-medium text-sm`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

window.elementSdk.init({

  onConfigChange: async (config) => {
    const title = config.site_title || defaultConfig.site_title;
    const welcome = config.welcome_message || defaultConfig.welcome_message;
    const bg = config.bg_color || defaultConfig.bg_color;
    const surface = config.surface_color || defaultConfig.surface_color;
    const textC = config.text_color || defaultConfig.text_color;
    const accent = config.accent_color || defaultConfig.accent_color;
    const secondary = config.secondary_color || defaultConfig.secondary_color;
    const font = config.font_family || defaultConfig.font_family;
    const fontSize = config.font_size || defaultConfig.font_size;

    // Apply styles
    document.body.style.fontFamily = `${font}, Tajawal, sans-serif`;
    document.body.style.fontSize = fontSize + 'px';

    // Update login screen
    const loginTitle = document.getElementById('loginTitle');
    const loginWelcome = document.getElementById('loginWelcome');
    const headerTitle = document.getElementById('headerTitle');
    if (loginTitle) loginTitle.textContent = title;
    if (loginWelcome) loginWelcome.textContent = welcome;

    // Apply colors via CSS custom properties used by dynamic elements
    document.documentElement.style.setProperty('--bg-color', bg);
    document.documentElement.style.setProperty('--surface-color', surface);
    document.documentElement.style.setProperty('--text-color', textC);
    document.documentElement.style.setProperty('--accent-color', accent);
    document.documentElement.style.setProperty('--secondary-color', secondary);

    // Direct DOM color updates
    document.querySelectorAll('.app-root').forEach(el => {
      el.style.color = textC;
    });

    // Apply to login screen background
    const loginScreen = document.getElementById('loginScreen');
    if (loginScreen) {
      loginScreen.style.background = `linear-gradient(135deg, ${bg} 0%, ${surface} 50%, ${bg} 100%)`;
    }
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.bg_color || defaultConfig.bg_color, set: (v) => { config.bg_color = v; window.elementSdk.setConfig({ bg_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
      { get: () => config.secondary_color || defaultConfig.secondary_color, set: (v) => { config.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); } }
    ],
    borderables: [],
    fontEditable: {
      get: () => config.font_family || defaultConfig.font_family,
      set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
    },
    fontSizeable: {
      get: () => config.font_size || defaultConfig.font_size,
      set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
    }

  mapToEditPanelValues: (config) => new Map([
    ['site_title', config.site_title || defaultConfig.site_title],
